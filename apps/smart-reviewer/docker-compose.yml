services:
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    env_file: .env
  fe:
    image: ghcr.io/martin-nef/smart-reviewer:latest-fe
    environment:
      API_URL: "https://smart-reviewer-api.nefcloud.top"
    restart: unless-stopped
  be:
    image: ghcr.io/martin-nef/smart-reviewer:latest-be
    env_file: .env
    restart: unless-stopped
    environment:
      MONGO_URI: "mongodb://mongo:27017/smart_reviewer"
    depends_on:
      - mongo
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - ./tmp/mongo:/data/db
