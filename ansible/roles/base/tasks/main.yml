---
# --- Docker ---

- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    state: present

- name: Install Docker
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Add deploy user to docker group
  ansible.builtin.user:
    name: deploy
    groups: docker
    append: true

- name: Enable Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Log in to GHCR
  community.docker.docker_login:
    registry_url: https://ghcr.io
    username: "{{ vault_github_username }}"
    password: "{{ vault_github_token }}"

# --- playit.gg ---

- name: Download playit.gg agent
  ansible.builtin.get_url:
    url: "https://github.com/playit-cloud/playit-agent/releases/download/v{{ playit_version }}/playit-linux-amd64"
    dest: /usr/local/bin/playit
    mode: "0755"
  notify: restart playit

- name: Create playit config directory
  ansible.builtin.file:
    path: /etc/playit
    state: directory
    mode: "0700"

- name: Write playit secret file
  ansible.builtin.copy:
    src: playit.toml
    dest: /etc/playit/secret.toml
    mode: "0600"
  notify: restart playit

- name: Install playit systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/playit.service
    mode: "0644"
    content: |
      [Unit]
      Description=playit.gg tunnel agent
      After=network-online.target
      Wants=network-online.target

      [Service]
      ExecStart=/usr/local/bin/playit --secret /etc/playit/secret.toml
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  notify: restart playit

- name: Enable playit service
  ansible.builtin.systemd:
    name: playit
    enabled: true
    daemon_reload: true

# --- Autopull ---

- name: Install autopull script
  ansible.builtin.copy:
    src: autopull.sh
    dest: /opt/apps/autopull.sh
    mode: "0755"

- name: Install autopull service unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/app-autopull.service
    mode: "0644"
    content: |
      [Unit]
      Description=Pull and restart Docker Compose apps

      [Service]
      Type=oneshot
      ExecStart=/opt/apps/autopull.sh

- name: Install autopull timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/app-autopull.timer
    mode: "0644"
    content: |
      [Unit]
      Description=Poll for Docker image updates

      [Timer]
      OnBootSec=5min
      OnUnitActiveSec=15s

      [Install]
      WantedBy=timers.target

- name: Enable autopull timer
  ansible.builtin.systemd:
    name: app-autopull.timer
    enabled: true
    state: started
    daemon_reload: true

# --- Unattended upgrades ---

- name: Install unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present

- name: Enable automatic security updates
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
