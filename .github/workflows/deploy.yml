name: Deploy

on:
  push:
    branches: [ main ]

env:
  SSH_CONFIG: |
    Host shitbox
      HostName shitbox.tail43f455.ts.net
      User deploy
      IdentityFile ~/.ssh/shitbox.pem
      StrictHostKeyChecking no

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Write vault password
        run: echo "${{ secrets.VAULT_PASSWORD }}" > ansible/.vault_password

      - name: Verify ansible config
        run: make verify

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SHITBOX_PEM }}" > ~/.ssh/shitbox.pem
          chmod 600 ~/.ssh/shitbox.pem
          echo "$SSH_CONFIG" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Run ansible-playbook
        working-directory: ansible
        run: ansible-playbook playbook.yml
